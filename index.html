<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookTracker - Biblioteka</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                <h1>Biblioteka</h1>
            </div>
            <nav class="nav">
                <button class="nav-btn active" data-filter="all">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
                    <span class="nav-text">Sve knjige</span>
                    <span class="nav-count" id="count-all">0</span>
                </button>
                <button class="nav-btn" data-filter="reading">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    <span class="nav-text">Čitam</span>
                    <span class="nav-count" id="count-reading">0</span>
                </button>
                <button class="nav-btn" data-filter="completed">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                    <span class="nav-text">Završene</span>
                    <span class="nav-count" id="count-completed">0</span>
                </button>
                <button class="nav-btn" data-filter="planned">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"></path><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
                    <span class="nav-text">Planirane</span>
                    <span class="nav-count" id="count-planned">0</span>
                </button>
                <button class="nav-btn" data-filter="dropped">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"></path><path d="M12 19l-7-7 7-7"></path><path d="M19 5v14"></path></svg>
                    <span class="nav-text">Odbačene</span>
                    <span class="nav-count" id="count-dropped">0</span>
                </button>
            </nav>
            <div class="sidebar-stats">
                <h3>Statistika</h3>
                <div class="stat-item">
                    <span>Ukupno knjiga</span>
                    <strong id="stat-total">0</strong>
                </div>
                <div class="stat-item">
                    <span>Stranica pročitano</span>
                    <strong id="stat-pages">0</strong>
                </div>
                <div class="stat-item">
                    <span>Ove godine</span>
                    <strong id="stat-year">0</strong>
                </div>
                <div class="stat-item">
                    <span>Prosečna ocena</span>
                    <strong id="stat-rating">—</strong>
                </div>
            </div>
        </aside>

        <main class="main">
            <header class="header">
                <div class="header-left">
                    <button class="menu-toggle" id="menuToggle"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
                    <div>
                        <h2 class="header-title" id="headerTitle">Sve knjige</h2>
                        <p class="header-sub" id="headerSub">Vaša kompletna biblioteka</p>
                    </div>
                </div>
                <div class="header-right">
                    <div class="search-box">
                        <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><path d="M21 21l-4.35-4.35"></path></svg>
                        <input type="text" id="searchInput" placeholder="Pretraži knjige..." autocomplete="off">
                    </div>
                    <select id="sortSelect" class="sort-select">
                        <option value="newest">Najnovije prvo</option>
                        <option value="oldest">Najstarije prvo</option>
                        <option value="title">Naslov A-Z</option>
                        <option value="title-desc">Naslov Z-A</option>
                        <option value="rating">Najbolje ocenjene</option>
                        <option value="pages">Najviše stranica</option>
                    </select>
                    <button class="btn-add" id="btnAdd">
                        <span>+</span> Dodaj knjigu
                    </button>
                </div>
            </header>

            <div class="books-container">
                <div class="books-grid" id="booksGrid"></div>
                <div class="empty-state" id="emptyState" style="display:none;">
                    <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                    <h3>Još uvek nema knjiga</h3>
                    <p>Započnite gradnju biblioteke dodavanjem prve knjige!</p>
                    <button class="btn-add" id="btnAddEmpty"><span>+</span> Dodaj prvu knjigu</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Add / Edit Modal -->
    <div class="modal-overlay" id="bookModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">Dodaj novu knjigu</h2>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <form id="bookForm" class="modal-body">
                <input type="hidden" id="bookId">
                <div class="form-group">
                    <label for="bookTitle">Naslov *</label>
                    <input type="text" id="bookTitle" required placeholder="Unesite naslov knjige" autocomplete="off">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="bookAuthor">Autor *</label>
                        <input type="text" id="bookAuthor" required placeholder="Ime autora" autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="bookGenre">Žanr</label>
                        <select id="bookGenre">
                            <option value="">Izaberite žanr</option>
                            <option>Fikcija</option>
                            <option>Beletristika</option>
                            <option>Naučna fantastika</option>
                            <option>Fantazija</option>
                            <option>Misterija</option>
                            <option>Triler</option>
                            <option>Romansa</option>
                            <option>Horor</option>
                            <option>Biografija</option>
                            <option>Samo-pomoć</option>
                            <option>Istorija</option>
                            <option>Nauka</option>
                            <option>Filozofija</option>
                            <option>Psihologija</option>
                            <option>Poezija</option>
                            <option>Strip</option>
                            <option>Ostalo</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="bookPages">Stranica</label>
                        <input type="number" id="bookPages" placeholder="Broj stranica" min="1">
                    </div>
                    <div class="form-group">
                        <label for="bookStatus">Status *</label>
                        <select id="bookStatus" required>
                            <option value="planned">Planirana</option>
                            <option value="reading">Čitam</option>
                            <option value="completed">Završena</option>
                            <option value="dropped">Odbačena</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="bookStart">Datum početka</label>
                        <input type="date" id="bookStart">
                    </div>
                    <div class="form-group">
                        <label for="bookEnd">Datum završetka</label>
                        <input type="date" id="bookEnd">
                    </div>
                </div>
                <div class="form-group">
                    <label>Ocena</label>
                    <div class="rating-input" id="ratingInput">
                        <span class="star" data-value="1"><svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg></span>
                        <span class="star" data-value="2"><svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg></span>
                        <span class="star" data-value="3"><svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg></span>
                        <span class="star" data-value="4"><svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg></span>
                        <span class="star" data-value="5"><svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg></span>
                        <button type="button" class="rating-clear" id="ratingClear">Poništi</button>
                    </div>
                    <input type="hidden" id="bookRating" value="0">
                </div>
                <div class="form-group">
                    <label for="bookCover">URL slike korica</label>
                    <input type="url" id="bookCover" placeholder="https://example.com/cover.jpg" autocomplete="off">
                    <small class="form-hint">Nalepite link do slike korica knjige (opciono)</small>
                </div>
                <div class="form-group">
                    <label for="bookNotes">Beleške</label>
                    <textarea id="bookNotes" placeholder="Vaše misli, omiljeni citati..." rows="3"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-cancel" id="btnCancel">Otkaži</button>
                    <button type="submit" class="btn-save">Sačuvaj knjigu</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Detail Modal -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal modal-detail">
            <button class="modal-close" id="detailClose">&times;</button>
            <div class="detail-content" id="detailContent"></div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Scripts — ORDER MATTERS -->
    <script src="js/db.js"></script>
    <script src="js/state.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/modals.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
